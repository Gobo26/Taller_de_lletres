<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller de Lletres · Gobo26</title>
  <meta name="description" content="Poemes i cançons de Gobo26">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#c4556a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Barlow+Condensed:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rosa:       #c4556a;
      --rosa-clar:  #f8e8eb;
      --oliva:      #7a8040;
      --oliva-clar: #eaecda;
      --cel:        #4a7a8a;
      --cel-clar:   #d8eaee;
      --sorra:      #b86840;
      --sorra-clar: #f5e4d8;
      --fosc:       #1c1a18;
      --gris:       #f0ede8;
      --blanc:      #faf8f5;
      --text:       #2e2c2a;
      --text2:      #6a6560;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--blanc);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--rosa);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo {
      font-family: 'Caveat', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      line-height: 1;
    }
    nav.tabs {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    nav.tabs a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.75);
      text-decoration: none;
      padding: .4rem .9rem;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 2px;
      transition: all .2s;
    }
    nav.tabs a:hover, nav.tabs a.actiu {
      background: rgba(255,255,255,.2);
      color: white;
    }

    /* ── HERO ── */
    .hero {
      background: var(--fosc);
      color: white;
      padding: 4rem 2rem 3.5rem;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '"';
      position: absolute;
      right: -1rem;
      top: 50%;
      transform: translateY(-55%);
      font-family: 'Caveat', cursive;
      font-size: clamp(14rem, 30vw, 26rem);
      line-height: 1;
      color: rgba(196,85,106,.18);
      pointer-events: none;
      user-select: none;
    }
    .hero-inner { position: relative; z-index: 1; max-width: 900px; }
    .hero-tag {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .72rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      background: var(--rosa);
      color: white;
      padding: .3rem .8rem;
      margin-bottom: 1.2rem;
    }
    .hero h1 {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 1;
      color: white;
      margin-bottom: .5rem;
    }
    .hero-sub {
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(255,255,255,.6);
    }

    /* ── SECCIÓ POEMES ── */
    .seccio-poemes { padding: 2.5rem 2rem 4rem; }

    .seccio-cap {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--fosc);
    }
    .seccio-titol {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--fosc);
    }
    .filtres { display: flex; gap: .4rem; flex-wrap: wrap; }
    .btn-filtre {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: transparent;
      border: 2px solid #ccc;
      color: var(--text2);
      padding: .3rem .85rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all .18s;
    }
    .btn-filtre.actiu, .btn-filtre:hover {
      border-color: var(--fosc);
      background: var(--fosc);
      color: white;
    }

    /* ── GRID ── */
    .grid-poemes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: 0;
    }

    /* ── TARGETA ── */
    /* Cada targeta rep un color de fons de la paleta */
    .targeta {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: opacity .2s;
      border: 1px solid rgba(0,0,0,.08);
    }
    .targeta:hover { opacity: .88; }

    .targeta.color-0 { background: var(--rosa-clar); }
    .targeta.color-1 { background: var(--oliva-clar); }
    .targeta.color-2 { background: var(--cel-clar); }
    .targeta.color-3 { background: var(--sorra-clar); }

    .cometa {
      font-family: 'Caveat', cursive;
      font-size: 5.5rem;
      line-height: .8;
      padding: 1rem 1.4rem .2rem;
      user-select: none;
    }
    .targeta.color-0 .cometa { color: rgba(196,85,106,.3); }
    .targeta.color-1 .cometa { color: rgba(122,128,64,.3); }
    .targeta.color-2 .cometa { color: rgba(74,122,138,.3); }
    .targeta.color-3 .cometa { color: rgba(184,104,64,.3); }

    .targeta-cos {
      flex: 1;
      padding: .3rem 1.6rem 1.4rem;
    }
    .extracte {
      font-style: italic;
      font-size: .97rem;
      line-height: 1.8;
      color: var(--fosc);
      white-space: pre-line;
    }

    .targeta-peu {
      padding: 1rem 1.6rem 1.2rem;
      border-top: 1.5px solid rgba(0,0,0,.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .peu-titol {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .88rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--fosc);
    }
    .peu-data {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem;
      color: var(--text2);
      letter-spacing: .06em;
    }
    .badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .68rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .18rem .55rem;
      border-radius: 2px;
    }
    .badge-ambdos { background: var(--rosa); color: white; }
    .badge-poema  { background: var(--fosc); color: white; }
    .badge-canco  { background: var(--oliva); color: white; }

    /* ── BUIT ── */
    .buit {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 1rem;
      font-style: italic;
      color: var(--text2);
    }

    /* ── MODAL ── */
    .modal-fons {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(28,26,24,.82);
      z-index: 200;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    .modal-fons.obert { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: white;
      border-top: 5px solid var(--rosa);
      width: 100%;
      max-width: 660px;
      padding: 2.5rem;
      position: relative;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-tancar {
      position: absolute;
      top: 1rem; right: 1.2rem;
      background: none; border: none;
      font-size: 1.3rem;
      color: var(--text2);
      cursor: pointer;
      transition: color .2s;
    }
    .modal-tancar:hover { color: var(--fosc); }

    .modal-badge { margin-bottom: 1rem; }
    .modal h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--fosc);
      line-height: 1.1;
      margin-bottom: .4rem;
    }
    .modal-data {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .82rem;
      letter-spacing: .1em;
      color: var(--text2);
      margin-bottom: 1.8rem;
    }
    .modal-linea {
      height: 3px;
      background: var(--rosa);
      width: 48px;
      margin-bottom: 2rem;
    }
    .modal-text {
      font-style: italic;
      font-size: 1.05rem;
      line-height: 2;
      color: var(--fosc);
      white-space: pre-wrap;
      margin-bottom: 2rem;
    }
    .modal-audio-titol {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .78rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--rosa);
      margin-bottom: .6rem;
      margin-top: 1.5rem;
    }
    audio {
      width: 100%;
      height: 36px;
      accent-color: var(--rosa);
      margin-bottom: 2rem;
    }
    .audio-pendent {
      font-size: .88rem;
      font-style: italic;
      color: var(--text2);
      margin-bottom: 2rem;
    }
    .modal-credits { margin-top: 1.5rem; }
    .credits-obra {
      font-family: 'Lora', serif;
      font-size: .82rem;
      color: var(--text2);
      line-height: 1.7;
      margin-bottom: 1.2rem;
    }
    .credits-obra .credits-linia { margin-bottom: .3rem; }
    .credits-obra .credits-linia:last-child { margin-bottom: 0; }
    .credits-etiqueta {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .82rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--fosc);
      margin-right: .35rem;
    }
    .credits-drets {
      padding: 1rem 1.2rem;
      background: var(--gris);
      border-left: 3px solid var(--rosa);
      font-family: 'Lora', serif;
      font-size: .82rem;
      line-height: 1.7;
      color: var(--text2);
    }
    .credits-drets-titol {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--fosc);
      margin-bottom: .6rem;
    }
    .credits-drets p { margin-bottom: .6rem; }
    .credits-drets p:last-child { margin-bottom: 0; }
    .credits-drets strong { color: var(--fosc); font-weight: 600; }
    .credits-reserva {
      font-style: italic;
      font-size: .76rem;
      margin-top: .8rem !important;
      padding-top: .6rem;
      border-top: 1px solid rgba(0,0,0,.08);
    }
    .modal-credits a {
      color: var(--rosa);
      text-decoration: none;
      border-bottom: 1px solid rgba(196,85,106,.3);
    }
    .modal-credits a:hover { border-bottom-color: var(--rosa); }
    .modal-peu {
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 2px solid var(--gris);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .modal-autor {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--fosc);
    }
    .modal-font {
      font-size: .75rem;
      color: var(--text2);
      font-style: italic;
      font-family: 'Lora', serif;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--fosc);
      color: rgba(255,255,255,.5);
      padding: 1.4rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    footer .logo { font-size: 1.6rem; color: white; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      transition: color .2s;
    }
    .footer-links a:hover { color: white; }

    @media (max-width: 540px) {
      header { padding: .8rem 1.2rem; }
      .hero  { padding: 2.5rem 1.2rem 2.5rem; }
      .seccio-poemes { padding-left: 1.2rem; padding-right: 1.2rem; }
      .modal { padding: 1.5rem 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="https://gobo26.github.io/gobo26/">Gobo26</a>
  <nav class="tabs">
    <a href="https://gobo26.github.io/gobo26/">Col·lecció</a>
    <a href="#" class="actiu">Taller de Lletres</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-tag">Gobo26 · Creació literària</div>
    <h1>Taller de Lletres</h1>
    <p class="hero-sub">Poemes que es fan cançons</p>
  </div>
</section>

<section class="seccio-poemes">
  <div class="seccio-cap">
    <div class="seccio-titol">Els poemes</div>
    <div class="filtres">
      <button class="btn-filtre actiu" onclick="filtrar('tot',this)">Tots</button>
      <button class="btn-filtre" onclick="filtrar('havanera',this)">Havaneres</button>
      <button class="btn-filtre" onclick="filtrar('bolero',this)">Boleros</button>
      <button class="btn-filtre" onclick="filtrar('rumba',this)">Rumbes</button>
      <button class="btn-filtre" onclick="filtrar('valset',this)">Valsets</button>
    </div>
  </div>
  <div class="grid-poemes" id="grid"></div>
</section>

<!-- MODAL -->
<div class="modal-fons" id="modal-fons" onclick="tancarModal(event)">
  <div class="modal" id="modal-cos">
    <button class="modal-tancar" onclick="tancarModal(null,true)">✕</button>
    <div class="modal-badge" id="m-badge"></div>
    <h2 id="m-titol"></h2>
    <div class="modal-data" id="m-data"></div>
    <div id="m-audio"></div>
    <div class="modal-linea"></div>
    <div class="modal-text" id="m-text"></div>
    <div id="m-credits"></div>
    <div class="modal-peu">
      <div>
        <div class="modal-autor">Gobo26</div>
        <div class="modal-font">tallerdelletres · gobo26.github.io</div>
      </div>
      <div id="m-badge2"></div>
    </div>
  </div>
</div>

<footer>
  <a class="logo" href="https://gobo26.github.io/gobo26/">Gobo26</a>
  <div class="footer-links">
    <a href="https://gobo26.github.io/gobo26/">Gobo26</a>
  </div>
</footer>

<script>
// ════════════════════════════════════════════════
//  DADES
//  Per afegir un poema nou: copia un bloc {},
//  omple titol, data (YYYY-MM-DD), tipus, extracte,
//  text i audio (nom fitxer mp3 o null)
// ════════════════════════════════════════════════
const POEMES = [
  {
    id: 1,
    titol: "La Tona i el Gat de Mar",
    data: "2026-05-26",
    tipus: "ambdos",
    estil: "rumba",
    extracte: "La noia se'l mira, coqueta,\nsens parar de treballar.\nI ell fa veure que no mira,\nperò no se'n perd detall.",
    text:
`En un poble de la costa,
entre les canyes i el mar,
la Tona passa les hores
les xarxes apedaçant.
Ajudant la seva mare
tot el matí sens parar
perquè pugui sortir el pare
avui al capvespre a la mar.

La barca arriba molt d'hora,
tota la nit han pescat,
els homes treuen les capses
plenes de peix a vessar.
Cal estendre ara les xarxes
plenes d'estrips fets pel mar.
Al jove que les col·loca
li diuen el "Gat de mar".

La noia se'l mira, coqueta
sens parar de treballar.
I ell fa veure que no mira,
però no se'n perd detall.
I així passaven els dies
mirant-se els dos d'amagat
buscant-se amb una mirada,
fent un somriure en passar.

Avui és la festa del Carme,
la patrona de la mar,
i tot el poble es prepara
per sortir a passejar.
S'ha fet il·lusions la Tona
esperant que el Gat de mar
no es perdi avui la festa
i la pugui acompanyar.

Surt la Tona de l'església
amb els ulls l'està buscant.
El noi l'espera a la plaça,
vestit com un capità.
Ell li regala una rosa,
ella li dóna la mà.
Són dos joves de la costa,
són dos joves catalans.

La noia se'l mira, coqueta
sens parar de treballar.
I ell fa veure que no mira,
però no se'n perd detall.
I així passaven els dies
mirant-se els dos d'amagat
buscant-se amb una mirada,
fent un somriure en passar.

Sentint com brolla la vida
entre els estris de la mar.`,
    audio: "la-tona-i-el-gat-de-mar.mp3",
    credits: { any: 2024 }
  },
  {
    id: 2,
    titol: "El Vers Final",
    data: "2026-05-27",
    tipus: "ambdos",
    estil: "bolero",
    extracte: "Si algun dia viure junts tingués sentit,\nsi algun dia el nostre amor pogués triomfar,\ndonaríem la raó a qui ens va dir\nque al final la vida escriu el vers final.",
    text:
`Quan es nota com arriba la tardor
i s'endinsa fins al fons del nostre cor,
quan el temps per ser valent ja s'ha passat,
és humà buscar l'amor al teu voltant.

Quan pensava que ja res podia esperar,
has fet créixer novament l'amor en mi.
He trobat un nou refugi al teu costat.
Il·luminen els teus ulls un nou camí.


Si algun dia viure junts tingués sentit,
si algun dia el nostre amor pogués triomfar,
donaríem la raó a qui ens va dir
que al final la vida escriu el vers final.


Ja no puc mirar-te als ulls sense sentir
el profund desig de fer-te mil petons,
de voler cridar-li al món que ja som dos,
de jurar-te que sempre et faré feliç.

I si un dia es trenqués el nostre amor
o la mort cruel un dia ens separés
una lletra de cançó recordarà
que la vida sempre escriu el vers final.`,
    audio: "el-vers-final.mp3",
    credits: { any: 2026 }
  },
  {
    id: 3,
    titol: "Agafa Fort el Timó",
    data: "2026-05-27",
    tipus: "ambdos",
    estil: "havanera",
    extracte: "Agafa fort el timó,\nvigila des d'on ens ve el vent,\nno perdis el far de vista,\navui la lluna és creixent.",
    text:
`Tinc records de ma infantesa
de moltes hores al mar
acompanyant el meu pare
els dies d'estiu a pescar.

La veu del pare sentia
donant-me savis consells
i ara em serveix de guia
quan surto al mar sense ell.

Agafa fort el timó,
vigila des d'on ens ve el vent,
no perdis el far de vista,
avui la lluna és creixent.

Recull la xarxa, fill meu
hem de tornar cap al port
que la mare ens espera,
deixem per demà el millor.

A la barca amb el meu pare
vaig descobrir el meu món
tinc el salanc a les venes
jo porto el mar dins del cor.`,
    audio: "agafa-fort-el-timo.mp3",
    credits: { any: 2026 }
  },
  {
    id: 4,
    titol: "Vela Blanca",
    data: "2026-05-27",
    tipus: "ambdos",
    estil: "valset",
    extracte: "Vela llatina, vela blanca,\nobre't tota cap al vent,\nque la mar mai no enganya\nqui la mira honestament.",
    text:
`Tinc una barca de vela,
que me l'ha deixada el mar,
que té la fusta cansada
de tant navegar i esperar.
Quan el vent empeny la vela
i el timó busca llevant,
jo vaig saltant per les ones
sense deixar de cantar.

Vela llatina, vela blanca,
obre't tota cap al vent,
que la mar mai no enganya
qui la mira honestament.
Vela llatina, companya,
porta'm lluny del vell dolor,
que quan navego en silenci
deixo enrere els meus malsons.

Quan la nit fosca m'envolta
i el cel s'omple d'estels,
només se sent la remor
parlant fluixet amb els rems.
Les ones esperen la lluna,
el vent descansa tranquil,
i la mar canta històries
dels que d'ella vivim.

I si un dia la mar crida
la barqueta cap al fons,
jo guardaré la seva ombra
dins el calaix dels records.
Que la mar no té amo
ni bandera ni destí,
només regala moments
als qui la saben sentir.`,
    audio: "vela-blanca.mp3",
    credits: { any: 2026 }
  },
  {
    id: 5,
    titol: "Paraules Sense Dir",
    data: "2026-05-27",
    tipus: "ambdos",
    estil: "bolero",
    extracte: "Si la història d'un amor hem d'explicar\nno podem deixar paraules sense dir,\nque la vida ens ha dut per molts camins\ni que tots ens han portat a aquest final.",
    text:
`Ja comença un nou dia a clarejar
i la negra nit es torna un vell record.
No he dormit pensant que he d'explicar-t'ho tot,
prô no trobo les paraules de comiat.

He de dir-te que el meu cor ja no és per tu,
que no vull seguir amagant la veritat,
per poder recuperar el temps perdut
i tornar a ser feliç sense lluitar.

Si la història d'un amor hem d'explicar
no podem deixar paraules sense dir,
que la vida ens ha dut per molts camins
i que tots ens han portat a aquest final.

No m'esperis més, no tornaré amb tu.
Tinc un nou amor que ja m'està esperant.
M'il·lusiono preparant un nou futur
al costat de qui em sàpiga estimar.

I serem tots dos acords d'una cançó,
peces lliures dins d'un puzzle inacabat,
uns ocells que volen junts i sense por
i d'un conte un final inesperat.`,
    audio: "paraules-sense-dir.mp3",
    credits: { any: 2026 }
  }
];

// ════════════════════════════════════════════════
const COLORS = ['color-0','color-1','color-2','color-3'];

let filtrActual = 'tot';

function filtrar(f, btn) {
  filtrActual = f;
  document.querySelectorAll('.btn-filtre').forEach(b => b.classList.remove('actiu'));
  if (btn) btn.classList.add('actiu');
  renderitzar();
}

function formatData(iso) {
  return iso.split('-')[0];
}

const ESTILS = {
  havanera: 'Havanera',
  bolero:   'Bolero',
  rumba:    'Rumba',
  valset:   'Valset',
};
const ESTIL_FILTRES = Object.keys(ESTILS);

function badgeHTML(tipus, estil) {
  const estilNom = estil && ESTILS[estil];
  if (estilNom && tipus === 'ambdos') {
    return `<span class="badge badge-ambdos">Poema · ${estilNom}</span>`;
  }
  if (estilNom && tipus === 'canco') {
    return `<span class="badge badge-canco">${estilNom}</span>`;
  }
  const map = {
    poema:  ['badge-poema',  'Poema'],
    canco:  ['badge-canco',  'Cançó'],
    ambdos: ['badge-ambdos', 'Poema · Cançó'],
  };
  const [cls,txt] = map[tipus]||map.poema;
  return `<span class="badge ${cls}">${txt}</span>`;
}

function renderitzar() {
  const grid = document.getElementById('grid');
  let data = [...POEMES];
  if (ESTIL_FILTRES.includes(filtrActual)) data = data.filter(p=>p.estil===filtrActual);
  data.sort((a,b)=>b.data.localeCompare(a.data));

  if (!data.length) {
    grid.innerHTML='<div class="buit">Cap poema trobat.</div>';
    return;
  }

  grid.innerHTML = data.map((p,i) => `
    <article class="targeta ${COLORS[i%4]}" onclick="obrirModal(${p.id})">
      <div class="cometa">"</div>
      <div class="targeta-cos">
        <p class="extracte">${p.extracte}</p>
      </div>
      <div class="targeta-peu">
        <div>
          <div class="peu-titol">${p.titol}</div>
          <div class="peu-data">${formatData(p.data)}</div>
        </div>
        <div style="display:flex;gap:.4rem;align-items:center">
          ${badgeHTML(p.tipus, p.estil)}
          ${p.audio?'<span style="font-size:1rem">♪</span>':''}
        </div>
      </div>
    </article>
  `).join('');
}

function obrirModal(id) {
  const p = POEMES.find(x=>x.id===id);
  if (!p) return;
  document.getElementById('m-badge').innerHTML  = badgeHTML(p.tipus, p.estil);
  document.getElementById('m-titol').textContent = p.titol;
  document.getElementById('m-data').textContent  = formatData(p.data);
  document.getElementById('m-text').textContent  = p.text;
  document.getElementById('m-badge2').innerHTML  = badgeHTML(p.tipus, p.estil);

  const audio = document.getElementById('m-audio');
  if (p.audio) {
    audio.innerHTML = `<div class="modal-audio-titol">♪ Escolta la cançó</div>
      <audio controls preload="none" src="${p.audio}"></audio>`;
  } else if (p.notaAudio) {
    audio.innerHTML = `<div class="modal-audio-titol">♪ Cançó</div>
      <p class="audio-pendent">${p.notaAudio}</p>`;
  } else {
    audio.innerHTML = '';
  }

  const creditsEl = document.getElementById('m-credits');
  if (p.credits) {
    const any = p.credits.any;
    const lletraLinia = `<div class="credits-linia"><span class="credits-etiqueta">Lletra:</span>© ${any} Juan Martínez Díaz (JRLP) — autor inscrit a SGAE</div>`;
    const musicaLinia = p.audio
      ? `<div class="credits-linia"><span class="credits-etiqueta">Música:</span>generada amb Suno AI sota direcció creativa de l'autor</div>`
      : '';
    creditsEl.innerHTML = `
      <div class="modal-credits">
        <div class="credits-obra">${lletraLinia}${musicaLinia}</div>
        <div class="credits-drets">
          <div class="credits-drets-titol">Ús i drets</div>
          <p><strong>Ús personal i no comercial:</strong> llicència <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/deed.ca" target="_blank" rel="noopener">CC BY-NC-ND 4.0</a> — pots compartir l'obra citant l'autor, sense modificar-la i sense ànim de lucre.</p>
          <p><strong>Usos comercials</strong> (sincronització audiovisual, edició discogràfica, interpretació pública remunerada, streaming amb ànim de lucre, publicitat, etc.): cal llicència expressa de l'autor. Contacte: <a href="mailto:fustaventura@gmail.com">fustaventura@gmail.com</a>.</p>
          <p class="credits-reserva">Tots els drets no concedits expressament queden reservats. L'ús comercial sense autorització dóna dret a la corresponent indemnització i compensació econòmica per part de l'autor.</p>
        </div>
      </div>`;
  } else {
    creditsEl.innerHTML = '';
  }

  document.getElementById('modal-fons').classList.add('obert');
  document.body.style.overflow='hidden';
}

function tancarModal(event, força=false) {
  if (força||(event&&event.target===document.getElementById('modal-fons'))) {
    document.getElementById('modal-fons').classList.remove('obert');
    document.body.style.overflow='';
    document.querySelectorAll('audio').forEach(a=>a.pause());
  }
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') tancarModal(null,true); });

renderitzar();
</script>
</body>
</html>
