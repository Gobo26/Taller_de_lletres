<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller de Lletres · Gobo26</title>
  <meta name="description" content="Poemes i cançons de Gobo26">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1c1410;
      --bg2:       #251c16;
      --bg3:       #2e231b;
      --or:        #c8883a;
      --or2:       #e8a855;
      --or3:       #f5c878;
      --text:      #e8ddd0;
      --text2:     #b8a898;
      --text3:     #7a6a5a;
      --green:     #6a9a5a;
      --green2:    #8ab87a;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      line-height: 1.7;
    }

    /* HEADER */
    header {
      background: linear-gradient(160deg, #0e0a06 0%, #1c1410 60%, #251a0e 100%);
      border-bottom: 1px solid #3a2a1a;
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,136,58,.08) 0%, transparent 70%);
    }
    .header-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
    .header-eyebrow {
      font-family: 'Lora', serif;
      font-size: .8rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--or);
      margin-bottom: .6rem;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 700;
      color: var(--or2);
      line-height: 1.15;
      margin-bottom: .5rem;
    }
    .header-sub {
      font-style: italic;
      color: var(--text2);
      font-size: 1rem;
    }
    .pen-icon { font-size: 2rem; display: block; margin-bottom: .8rem; }

    /* NAV */
    nav {
      display: flex;
      gap: .5rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: .8rem 1rem;
      background: var(--bg2);
      border-bottom: 1px solid #3a2a1a;
    }
    nav a {
      color: var(--text2);
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: .06em;
      padding: .3rem .8rem;
      border-radius: 20px;
      transition: all .2s;
    }
    nav a:hover, nav a.actiu {
      background: rgba(200,136,58,.15);
      color: var(--or3);
    }

    /* MAIN */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.2rem 4rem;
    }

    /* FILTRE */
    .filtres {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      align-items: center;
    }
    .filtre-label {
      font-size: .8rem;
      color: var(--text3);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-right: .3rem;
    }
    .btn-filtre {
      background: var(--bg2);
      border: 1px solid #3a2a1a;
      color: var(--text2);
      font-family: 'Lora', serif;
      font-size: .82rem;
      padding: .3rem .9rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-filtre:hover, .btn-filtre.actiu {
      background: rgba(200,136,58,.2);
      border-color: var(--or);
      color: var(--or3);
    }

    /* POEMES */
    .llista-poemes { display: flex; flex-direction: column; gap: 2rem; }

    .targeta {
      background: var(--bg2);
      border: 1px solid #3a2a1a;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .targeta:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.6); }

    .targeta-header {
      padding: 1.4rem 1.6rem 1rem;
      border-bottom: 1px solid #3a2a1a;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .targeta-titol {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--or2);
      line-height: 1.3;
    }
    .targeta-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .3rem;
      flex-shrink: 0;
    }
    .targeta-data {
      font-size: .78rem;
      color: var(--text3);
      letter-spacing: .06em;
    }
    .badge {
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: 10px;
      font-family: 'Lora', serif;
    }
    .badge-poema  { background: rgba(106,154,90,.2); color: var(--green2); border: 1px solid rgba(106,154,90,.3); }
    .badge-canco  { background: rgba(200,136,58,.2); color: var(--or3);    border: 1px solid rgba(200,136,58,.3); }

    .targeta-cos { padding: 1.4rem 1.6rem; }

    /* TEXT DEL POEMA */
    .poema-text {
      white-space: pre-wrap;
      font-style: italic;
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 1.2rem;
    }
    .poema-text-curt { max-height: 6lh; overflow: hidden; }
    .poema-text-curt.expandit { max-height: none; }

    .btn-llegir {
      background: none;
      border: none;
      color: var(--or);
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: .9rem;
      cursor: pointer;
      padding: 0;
      margin-bottom: 1rem;
      transition: color .2s;
    }
    .btn-llegir:hover { color: var(--or3); }

    /* AUDIO */
    .seccio-canco {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #3a2a1a;
    }
    .canco-titol {
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--or);
      margin-bottom: .6rem;
    }
    audio {
      width: 100%;
      height: 36px;
      border-radius: 8px;
      accent-color: var(--or2);
    }
    .canco-pendent {
      font-size: .88rem;
      font-style: italic;
      color: var(--text3);
    }

    /* SEPARADOR DECORATIU */
    .separador {
      text-align: center;
      color: var(--text3);
      font-size: 1.1rem;
      letter-spacing: .4em;
      margin: .5rem 0 0;
    }

    /* FOOTER */
    footer {
      background: #0e0a06;
      border-top: 1px solid #3a2a1a;
      text-align: center;
      padding: 1.5rem 1rem;
      color: var(--text3);
      font-size: .82rem;
    }
    footer a {
      color: var(--or);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* BUIT */
    .buit {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
      font-style: italic;
    }

    /* RESPONSIVE */
    @media (max-width: 540px) {
      .targeta-header { flex-direction: column; }
      .targeta-meta { align-items: flex-start; flex-direction: row; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="pen-icon">✒️</span>
    <div class="header-eyebrow">Gobo26 · Col·lecció literària</div>
    <h1>Taller de Lletres</h1>
    <p class="header-sub">Poemes que es fan cançons</p>
  </div>
</header>

<nav>
  <a href="https://gobo26.github.io/gobo26/" target="_blank">← Gobo26</a>
  <a href="#" class="actiu">Tots</a>
  <a href="#" onclick="filtrar('poema');return false;">Poemes</a>
  <a href="#" onclick="filtrar('canco');return false;">Cançons</a>
</nav>

<main>
  <div class="filtres" id="filtres">
    <span class="filtre-label">Ordre:</span>
    <button class="btn-filtre actiu" onclick="ordenar('desc')">Més nous primer</button>
    <button class="btn-filtre" onclick="ordenar('asc')">Més antics primer</button>
  </div>

  <div class="llista-poemes" id="llista"></div>
</main>

<footer>
  <p>Taller de Lletres · <a href="https://github.com/Gobo26/Taller_de_lletres" target="_blank">GitHub</a> · <a href="https://gobo26.github.io/gobo26/">Gobo26</a></p>
</footer>

<script>
// ─── DADES ─────────────────────────────────────────────────────────────────
// Per afegir un poema nou, copia un bloc {} i omple els camps.
// camp "audio": nom del fitxer (ex: "la_tardor.mp3") o null si no hi ha cançó.
// camp "tipus": "poema" | "canco" | "ambdos"
const POEMES = [
  {
    id: 1,
    titol: "La tardor que ve",
    data: "2025-10-14",
    tipus: "ambdos",
    text: `Les fulles cauen lentes,
una per una, com paraules
que no s'han dit a temps.

El vent recull els silencis
i els porta terra amunt,
on potser algú els escolta.

Tornarà la primavera
amb noves fulles verdes,
però les paraules perdudes
ja no tornaran.`,
    audio: null,   // ex: "la_tardor_que_ve.mp3"
    notaAudio: "Cançó en preparació"
  },
  {
    id: 2,
    titol: "Exemple sense cançó",
    data: "2025-11-03",
    tipus: "poema",
    text: `Aquí va el text del segon poema.
Substitueix-lo pel teu.

Cada estrofa és un món,
cada vers un pas.`,
    audio: null,
    notaAudio: null
  }
];

// ─── LÒGICA ────────────────────────────────────────────────────────────────
let filtrActual = 'tot';
let ordreActual = 'desc';

function filtrar(f) {
  filtrActual = f;
  renderitzar();
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('actiu'));
}

function ordenar(o) {
  ordreActual = o;
  document.querySelectorAll('.btn-filtre').forEach(b => b.classList.remove('actiu'));
  event.target.classList.add('actiu');
  renderitzar();
}

function expandir(id) {
  const el = document.getElementById('text-' + id);
  const btn = document.getElementById('btn-' + id);
  el.classList.toggle('expandit');
  btn.textContent = el.classList.contains('expandit') ? '↑ Plegar' : '↓ Llegir tot';
}

function formatData(iso) {
  const [y, m, d] = iso.split('-');
  const mesos = ['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'];
  return `${parseInt(d)} ${mesos[parseInt(m)-1]} ${y}`;
}

function renderitzar() {
  const llista = document.getElementById('llista');
  let data = [...POEMES];

  if (filtrActual === 'poema') data = data.filter(p => p.tipus === 'poema');
  if (filtrActual === 'canco') data = data.filter(p => p.tipus === 'canco' || p.tipus === 'ambdos');

  data.sort((a, b) => ordreActual === 'desc'
    ? b.data.localeCompare(a.data)
    : a.data.localeCompare(b.data));

  if (!data.length) {
    llista.innerHTML = '<div class="buit">Cap entrada trobada.</div>';
    return;
  }

  llista.innerHTML = data.map(p => {
    const linies = p.text.split('\n').length;
    const llarg  = linies > 6;
    const badgeTipus = p.tipus === 'poema' ? 'badge-poema' : p.tipus === 'canco' ? 'badge-canco' : 'badge-poema';
    const badgeText  = p.tipus === 'poema' ? 'Poema' : p.tipus === 'canco' ? 'Cançó' : 'Poema · Cançó';

    const audioHtml = p.audio
      ? `<div class="seccio-canco">
           <div class="canco-titol">🎵 Escolta la cançó</div>
           <audio controls preload="none" src="${p.audio}"></audio>
         </div>`
      : p.notaAudio
        ? `<div class="seccio-canco">
             <div class="canco-titol">🎵 Cançó</div>
             <p class="canco-pendent">${p.notaAudio}</p>
           </div>`
        : '';

    return `
    <article class="targeta" data-id="${p.id}">
      <div class="targeta-header">
        <div class="targeta-titol">${p.titol}</div>
        <div class="targeta-meta">
          <span class="targeta-data">${formatData(p.data)}</span>
          <span class="badge ${badgeTipus}">${badgeText}</span>
        </div>
      </div>
      <div class="targeta-cos">
        <div class="poema-text ${llarg ? 'poema-text-curt' : ''}" id="text-${p.id}">${p.text}</div>
        ${llarg ? `<button class="btn-llegir" id="btn-${p.id}" onclick="expandir(${p.id})">↓ Llegir tot</button>` : ''}
        <div class="separador">· · ·</div>
        ${audioHtml}
      </div>
    </article>`;
  }).join('');
}

renderitzar();
</script>
</body>
</html>
